name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Run the full CI suite (lint, format, test, build) before anything ships.
  # Gating the deploy on this means a broken push to main never reaches Pages.
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install, build, and upload site
        uses: withastro/action@v6
        # package-manager is auto-detected from pnpm-lock.yaml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
